# Minimal Kubernetes manifests for TaDashboard.
#
# Mount a PVC at /app/db so the local SQLite file persists across pod restarts.
# Provide the controller URL and (optional) projected service-account token
# via environment variables.

apiVersion: v1
kind: Namespace
metadata:
  name: hiclaw-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hiclaw-dashboard
  namespace: hiclaw-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hiclaw-dashboard-db
  namespace: hiclaw-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiclaw-dashboard
  namespace: hiclaw-system
  labels:
    app.kubernetes.io/name: hiclaw-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hiclaw-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hiclaw-dashboard
    spec:
      serviceAccountName: hiclaw-dashboard
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      containers:
        - name: dashboard
          image: hiclaw-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "file:/app/db/custom.db"
            - name: HICLAW_CONTROLLER_URL
              value: "http://hiclaw-controller.hiclaw-system:8090"
            # Use a projected token if you want zero-downtime token rotation.
            - name: HICLAW_AUTH_TOKEN_FILE
              value: "/var/run/secrets/hiclaw/token"
            - name: NEXT_PUBLIC_MATRIX_API_URL
              value: "https://matrix.example.com"
          volumeMounts:
            - name: db
              mountPath: /app/db
            - name: tmp
              mountPath: /tmp
            - name: sa-token
              mountPath: /var/run/secrets/hiclaw
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: hiclaw-dashboard-db
        - name: tmp
          emptyDir: {}
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: hiclaw-controller
                  expirationSeconds: 3600
---
apiVersion: v1
kind: Service
metadata:
  name: hiclaw-dashboard
  namespace: hiclaw-system
  labels:
    app.kubernetes.io/name: hiclaw-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hiclaw-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http